<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOP THE BLEED INSTRUCTOR - OXYFIGHT CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --stb-red: #b3252b; 
            --stb-black: #000000;
            --stb-white: #ffffff;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #fcfcfc; 
            margin: 0; padding: 0; 
        }

        .navbar { 
            background-color: var(--stb-black) !important; 
            border-bottom: 4px solid var(--stb-red);
            padding: 12px 0;
        }
        .navbar-brand { font-weight: 600; color: var(--stb-white) !important; font-size: 15px; letter-spacing: 0.5px; }
        .fa-drop-red { color: var(--stb-red); }

        .header-section { 
            padding: 40px 0; 
            background: var(--stb-white);
            border-bottom: 1px solid #eee;
            margin-bottom: 30px;
        }
        .logo-container img { 
            height: 140px; 
            width: auto; 
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        
        .text-container h1 { 
            color: var(--stb-red); 
            font-weight: 800; 
            font-size: 34px; 
            margin-bottom: 0px;
            line-height: 1.2;
        }
        .text-container h2 {
            color: var(--stb-red);
            font-weight: 700;
            font-size: 22px;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        .sub-text { color: #666; font-size: 15px; font-weight: 400; }

        .menu-card {
            background: linear-gradient(135deg, #b3252b, #8a1d21);
            border-radius: 12px; 
            height: 85px; 
            display: flex; 
            align-items: center;
            padding: 0 25px; 
            color: var(--stb-white) !important; 
            text-decoration: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none; 
            margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(179, 37, 43, 0.2);
            cursor: pointer;
        }
        .menu-card:hover { 
            transform: translateX(10px); 
            box-shadow: 0 10px 25px rgba(179, 37, 43, 0.35); 
            filter: brightness(1.1);
        }
        .menu-card i { font-size: 24px; margin-right: 20px; width: 40px; text-align: center; }
        .menu-card h4 { font-weight: 600; font-size: 16px; margin: 0; }

        /* ปรับสีให้การ์ด Q&A เด่นขึ้นนิดนึง (สีดำ-แดง) */
        .menu-forum {
            background: linear-gradient(135deg, #222, #000);
            border-left: 5px solid var(--stb-red);
        }
        .menu-forum:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .menu-forum i { color: var(--stb-red); }

        .display-area {
            background: white; 
            border-radius: 20px; 
            padding: 30px;
            border-left: 8px solid var(--stb-red);
            box-shadow: 0 12px 40px rgba(0,0,0,0.07);
            overflow: hidden;
            height: 100%;
        }

        .news-img {
            max-width: 100%; 
            height: auto; 
            border-radius: 12px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-outline-danger {
            color: var(--stb-red);
            border-color: var(--stb-red);
        }
        .btn-outline-danger:hover {
            background-color: var(--stb-red);
            border-color: var(--stb-red);
            color: white;
        }

        @media (max-width: 991px) {
            .text-container h1 { font-size: 26px; }
            .logo-container img { height: 110px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-tint me-2 fa-drop-red"></i>
                STOP THE BLEED INSTRUCTOR DIRECTORY
            </span>
        </div>
    </nav>

    <div class="container header-section text-center">
        <div class="logo-container">
            <img src="https://cppqbctiybszcneqawjw.supabase.co/storage/v1/object/public/PIC/STB-Ins.png" alt="STOP THE BLEED LOGO">
        </div>
        <div class="text-container">
            <h1>STOP THE BLEED INSTRUCTOR</h1>
            <h2>BY OXYFIGHT CENTER</h2>
            <p class="sub-text">ทำเนียบรุ่นครูผู้สอน</p>
        </div>
    </div>

    <div class="container py-2 mb-5">
        <div class="row g-4">
            <!-- ส่วนของปุ่มเมนู (ฝั่งซ้าย) -->
            <div class="col-lg-4 col-md-5">
                <div class="menu-card" onclick="window.location.href='register.html'">
                    <i class="fas fa-user-check"></i>
                    <h4>ลงทะเบียนผู้สอน</h4>
                </div>
                <div class="menu-card" onclick="window.location.href='list.html'">
                    <i class="fas fa-address-card"></i>
                    <h4>ทำเนียบผู้เชี่ยวชาญ</h4>
                </div>
                <div class="menu-card" onclick="window.location.href='news.html'">
                    <i class="fas fa-bullhorn"></i>
                    <h4>ประกาศและข่าวสาร</h4>
                </div>
                
                <!-- การ์ด Q&A ไปยังเว็บบอร์ด -->
                <div class="menu-card menu-forum" onclick="window.location.href='forum.html'">
                    <i class="fas fa-comments"></i>
                    <h4>Q&A กระดานถาม-ตอบ</h4>
                </div>
            </div>

            <!-- ส่วนแสดงข่าวสาร (ฝั่งขวา) -->
            <div class="col-lg-8 col-md-7" id="mainContent">
                <div class="display-area text-center py-5 d-flex flex-column justify-content-center">
                    <div>
                        <div class="spinner-border" style="color: var(--stb-red)" role="status"></div>
                        <p class="mt-3 text-muted">กำลังดึงข้อมูลล่าสุด...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // *** อัปเดตลิงก์ API ให้เป็นตัวล่าสุดเสมอ ***
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxnr0zqjwDx3nmLii061zOnU_Bhvva8UxQ-Qf1beH0EA8eRAOFigiuxrpn_Qihci8DE/exec';

        // ฟังก์ชันแปลงวันที่เป็นภาษาไทย พ.ศ.
        const fmtThaiDate = (d) => {
            if (!d) return "-";
            const date = new Date(d);
            if (isNaN(date.getTime())) return d;
            const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
        };

        window.onload = function() {
            fetch(`${scriptUrl}?action=getNews&t=${Date.now()}`)
                .then(res => res.json())
                .then(newsData => {
                    const latest = newsData[0];
                    const contentArea = document.getElementById('mainContent');
                    
                    if(latest) {
                        const img = latest.imageurl || latest.ImageUrl || latest.รูปภาพ || "";
                        const dateVal = latest.date || latest.วันที่ || "";

                        contentArea.innerHTML = `
                            <div class="display-area">
                                ${img ? `<img src="${img}" class="news-img shadow-sm" alt="News Image">` : ''}
                                <h3 class="fw-bold mb-2" style="color:var(--stb-red)">${latest.title || 'ประกาศ'}</h3>
                                <p class="text-muted small mb-3">
                                    <i class="far fa-calendar-alt me-1"></i> ประกาศเมื่อ: ${fmtThaiDate(dateVal)}
                                </p>
                                <div style="white-space: pre-wrap; line-height: 1.8; color: #333; font-size: 16px;">${latest.detail || ''}</div>
                                <div class="mt-4 text-end">
                                    <a href="news.html" class="btn btn-outline-danger btn-sm rounded-pill px-4">อ่านข่าวทั้งหมด</a>
                                </div>
                            </div>`;
                    } else {
                        contentArea.innerHTML = '<div class="display-area text-center py-5">ขณะนี้ยังไม่มีประกาศใหม่</div>';
                    }
                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    document.getElementById('mainContent').innerHTML = `
                        <div class="display-area text-center py-5 text-danger">
                            <i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br>
                            ไม่สามารถโหลดข้อมูลข่าวสารได้
                        </div>`;
                });
        };
    </script>
</body>
</html>
