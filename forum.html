<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บบอร์ด - STOP THE BLEED INSTRUCTOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <style>
        :root {
            --stb-red: #b3252b;
            --stb-black: #000000;
            --stb-white: #ffffff;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: var(--stb-black) !important; border-bottom: 4px solid var(--stb-red); height: 55px; }
        .navbar-brand { font-size: 15px; color: white !important; font-weight: 600; }
        .forum-container { max-width: 900px; margin: 30px auto; }
        
        /* การ์ดกระทู้ */
        .post-card { 
            border-radius: 15px; 
            border: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            background: white; 
            position: relative; 
            overflow: hidden; 
            transition: 0.3s;
            padding-bottom: 60px !important; /* เพิ่มที่ว่างด้านล่างสำหรับปุ่ม */
        }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .author-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
        .comment-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .btn-stb { background-color: var(--stb-red); color: white; border-radius: 25px; font-weight: 600; border: none; padding: 10px 25px; }
        .hidden { display: none !important; }
        .user-pill { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; color: white; font-size: 0.85rem; }
        
        /* ปุ่มจัดการย้ายมามุมล่างขวา */
        .admin-controls { 
            position: absolute; 
            bottom: 15px; 
            right: 15px; 
            z-index: 10; 
            display: flex; 
            gap: 8px; 
        }
        .btn-delete-post { 
            background-color: var(--stb-red); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            padding: 6px 14px; 
            transition: 0.2s; 
            box-shadow: 0 4px 10px rgba(179, 37, 43, 0.2);
        }
        .btn-delete-post:hover { background-color: #8a1d21; transform: scale(1.05); }
        
        .btn-edit-post { 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            padding: 6px 14px; 
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
        }
        .btn-edit-post:hover { background-color: #0b5ed7; transform: scale(1.05); }

        /* ส่วนของคอมเมนต์ */
        .comment-item { background: #fdfdfd; border-radius: 10px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #ddd; }
        .comment-admin { border-left: 3px solid var(--stb-red) !important; background: #fff5f5 !important; }
        .comment-author { font-weight: 700; color: #333; font-size: 13px; }
        .admin-tag { color: var(--stb-red); font-size: 11px; margin-left: 5px; font-weight: 800; }
        .comment-text { font-size: 14px; color: #444; margin-top: 2px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand m-0" href="index.html">
            <i class="fas fa-comments me-2" style="color: var(--stb-red);"></i>เว็บบอร์ดผู้สอน
        </a>
        <div id="userInfo" class="hidden d-flex align-items-center">
            <div class="user-pill me-2">
                <img id="userAvatar" src="" style="width: 25px; height: 25px; border-radius: 50%; object-fit: cover;">
                <span id="userNameDisplay" class="fw-bold d-none d-sm-inline"></span>
            </div>
            <a href="index.html" class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill me-2"><i class="fas fa-home me-1"></i>หน้าหลัก</a>
            <button class="btn btn-danger btn-sm rounded-pill" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<div class="container forum-container hidden" id="forumContent">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold"><i class="fas fa-list-ul me-2 text-danger"></i>กระทู้ถาม-ตอบ</h3>
        <button class="btn-stb" data-bs-toggle="modal" data-bs-target="#addPostModal"><i class="fas fa-plus me-2"></i>ตั้งคำถามใหม่</button>
    </div>
    <div id="postsList">
        <div class="text-center py-5"><div class="spinner-border text-danger"></div></div>
    </div>
</div>

<!-- Modal: Login -->
<div class="modal fade" id="loginModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-body p-5 text-center">
                <i class="fas fa-user-shield fa-3x text-danger mb-4"></i>
                <h4 class="fw-bold mb-3">พื้นที่จัดการระบบ</h4>
                <p class="text-muted small mb-4">กรุณากรอกรหัสผ่านเพื่อยืนยันตัวตน</p>
                <input type="password" id="passInput" class="form-control form-control-lg text-center fw-bold mb-3" placeholder="ระบุรหัสผ่าน">
                <button class="btn btn-danger w-100 btn-lg fw-bold" onclick="handleLogin()">ยืนยันสิทธิ์</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Add Post -->
<div class="modal fade" id="addPostModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-body p-4">
                <h5 class="fw-bold text-danger mb-3">ระบุคำถามของคุณ</h5>
                <select id="postCategory" class="form-select mb-3">
                    <option value="พูดคุยทั่วไป">พูดคุยทั่วไป</option>
                    <option value="เทคนิคการสอน">เทคนิคการสอน</option>
                    <option value="อุปกรณ์การแพทย์">อุปกรณ์การแพทย์</option>
                </select>
                <input type="text" id="postTitle" class="form-control mb-3" placeholder="หัวข้อคำถาม">
                <textarea id="postContent" class="form-control mb-3" rows="5" placeholder="รายละเอียด..."></textarea>
                <div class="text-end">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn-stb" onclick="submitPost()">โพสต์กระทู้</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Edit Post -->
<div class="modal fade" id="editPostModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-body p-4">
                <h5 class="fw-bold text-primary mb-3"><i class="fas fa-edit me-2"></i>แก้ไขข้อความของคุณ</h5>
                <input type="hidden" id="editPostId">
                <input type="text" id="editPostTitle" class="form-control mb-3" placeholder="หัวข้อคำถาม">
                <textarea id="editPostContent" class="form-control mb-3" rows="5" placeholder="รายละเอียด..."></textarea>
                <div class="text-end">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn-primary btn rounded-pill px-4" onclick="updatePost()">บันทึกการแก้ไข</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const CONFIG = {
        GAS: 'https://script.google.com/macros/s/AKfycbxnr0zqjwDx3nmLii061zOnU_Bhvva8UxQ-Qf1beH0EA8eRAOFigiuxrpn_Qihci8DE/exec',
        SB_URL: 'https://cvtpzuqmensoigxzmwrk.supabase.co',
        SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dHB6dXFtZW5zb2lneHptd3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzM5NDEsImV4cCI6MjA5NDIwOTk0MX0.yrpFk48HUihXuhZzLZ6_3yEtZhduU8yRZgQ-VrYUwQY'
    };
    
    let supabaseClient; 
    let currentInstructor = null;
    let authModal;

    document.addEventListener('DOMContentLoaded', () => {
        try {
            supabaseClient = window.supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
            authModal = new bootstrap.Modal(document.getElementById('loginModal'));
            document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
            checkSession();
        } catch (e) { console.error(e); }
    });

    function checkSession() {
        const session = localStorage.getItem('stb_instructor');
        if (session) {
            currentInstructor = JSON.parse(session);
            showUI();
            loadPosts();
        } else {
            authModal.show();
            setTimeout(() => { document.getElementById('passInput').focus(); }, 500);
        }
    }

    async function handleLogin() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;

        // ดักรหัสลับ 1669 เอาไว้เป็น Backdoor เหมือนเดิม (ไม่ต้องดึงข้อมูลจาก Sheet)
        if (pass === '1669') {
            currentInstructor = { seq: '1669', name: 'Admin', avatar: 'https://cdn-icons-png.flaticon.com/512/6024/6024190.png', role: 'admin' };
            finalizeLogin(); return;
        }

        Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            // โหลดข้อมูลคนปกติจาก Google Sheets
            const res = await fetch(`${CONFIG.GAS}?action=getMembers&t=${Date.now()}`);
            const members = await res.json();
            const found = members.find(m => String(m.sequence || m.ลำดับ) === pass);

            if (found) {
                // *** เช็คจุดนี้: ถ้ารหัสเป็น 32 ให้ยศ admin ถ้ารหัสอื่นเป็น user ธรรมดา ***
                const userRole = (pass === '32') ? 'admin' : 'user';

                currentInstructor = {
                    seq: pass,
                    name: found.fullName || found.ชื่อนามสกุล || found.fullname, // ได้ชื่อจริงจากฐานข้อมูล
                    avatar: found.imageUrl || found.imageurl || '', // ได้รูปจริงจากฐานข้อมูล
                    role: userRole 
                };
                
                if(currentInstructor.avatar.includes('id=')) {
                    currentInstructor.avatar = `https://drive.google.com/thumbnail?id=${currentInstructor.avatar.split('id=')[1].split('&')[0]}&sz=w200`;
                }
                finalizeLogin();
            } else { Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error'); }
        } catch (e) { Swal.fire('Error', 'ระบบขัดข้อง', 'error'); }
    }

    function finalizeLogin() {
        localStorage.setItem('stb_instructor', JSON.stringify(currentInstructor));
        if (Swal.isVisible()) Swal.close();
        authModal.hide();
        showUI();
        loadPosts();
    }

    function showUI() {
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('forumContent').classList.remove('hidden');
        document.getElementById('userAvatar').src = currentInstructor.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('userNameDisplay').innerText = currentInstructor.name;
    }

    async function loadPosts() {
        const container = document.getElementById('postsList');
        const { data: posts, error } = await supabaseClient
            .from('posts')
            .select('*, comments(*)')
            .order('created_at', { ascending: false });

        if (posts) {
            if (posts.length === 0) {
                container.innerHTML = '<div class="text-center py-5 text-muted">ยังไม่มีกระทู้</div>';
                return;
            }

            container.innerHTML = posts.map(p => {
                const isOwner = String(p.author_seq) === String(currentInstructor.seq);
                const isAdmin = currentInstructor.role === 'admin';

                const commentsHtml = p.comments ? p.comments.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).map(c => `
                    <div class="comment-item ${c.author_seq === '1669' ? 'comment-admin' : ''}">
                        <div class="d-flex gap-2 align-items-center">
                            <img src="${c.author_avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="comment-img">
                            <div class="comment-author">
                                ${c.author_name} 
                                ${c.author_seq === '1669' ? '<span class="admin-tag">[Admin]</span>' : ''}
                            </div>
                        </div>
                        <div class="comment-text ms-4">${c.message}</div>
                    </div>
                `).join('') : '';

                return `
                    <div class="card post-card p-4">
                        
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <img src="${p.author_avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="author-img">
                            <div class="w-100">
                                <div class="d-flex justify-content-between pe-5">
                                    <div class="fw-bold text-danger">
                                        ${p.author_name} 
                                        ${p.author_seq === '1669' ? '<i class="fas fa-check-circle small ms-1"></i>' : ''}
                                    </div>
                                    <span class="badge bg-danger rounded-pill">${p.category || 'พูดคุย'}</span>
                                </div>
                                <div class="text-muted small">${new Date(p.created_at).toLocaleString('th-TH')}</div>
                            </div>
                        </div>
                        <h5 class="fw-bold mb-2">${p.title}</h5>
                        <p class="text-muted mb-4" style="white-space: pre-wrap;">${p.content}</p>
                        <hr class="my-3 opacity-25">
                        <div id="comments-${p.id}">${commentsHtml}</div>
                        <div class="input-group input-group-sm mt-3">
                            <input type="text" id="reply-${p.id}" class="form-control border-danger" placeholder="พิมพ์ข้อความตอบกลับ...">
                            <button class="btn btn-danger" onclick="submitComment('${p.id}')">ส่ง</button>
                        </div>
                        
                        <!-- กลุ่มปุ่มจัดการ ย้ายมามุมล่างขวา -->
                        <div class="admin-controls">
                            ${isOwner ? `<button class="btn-edit-post" onclick="openEditModal('${p.id}', '${p.title}', \`${p.content}\`)"><i class="fas fa-pen"></i> แก้ไข</button>` : ''}
                            ${(isAdmin || isOwner) ? `<button class="btn-delete-post" onclick="deletePost('${p.id}')"><i class="fas fa-trash-alt"></i> ลบทิ้ง</button>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }
    }

    async function submitComment(postId) {
        const input = document.getElementById(`reply-${postId}`);
        const msg = input.value.trim();
        if(!msg) return;

        const { error } = await supabaseClient.from('comments').insert([{
            post_id: postId,
            message: msg,
            author_name: currentInstructor.name,
            author_seq: currentInstructor.seq,
            author_avatar: currentInstructor.avatar
        }]);

        if(!error) { input.value = ''; loadPosts(); }
        else { Swal.fire('Error', error.message, 'error'); }
    }

    async function deletePost(postId) {
        const confirm = await Swal.fire({ title: 'ลบกระทู้?', text: "ข้อมูลจะหายไปถาวร", icon: 'warning', showCancelButton: true, confirmButtonColor: '#b3252b' });
        if (confirm.isConfirmed) {
            Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const { error } = await supabaseClient.from('posts').delete().match({ id: postId });
            if (!error) { 
                Swal.fire({ icon: 'success', title: 'ลบเรียบร้อย', showConfirmButton: false, timer: 1000 });
                loadPosts(); 
            } else { Swal.fire('Error', error.message, 'error'); }
        }
    }

    function openEditModal(id, title, content) {
        document.getElementById('editPostId').value = id;
        document.getElementById('editPostTitle').value = title;
        document.getElementById('editPostContent').value = content;
        new bootstrap.Modal(document.getElementById('editPostModal')).show();
    }

    async function updatePost() {
        const id = document.getElementById('editPostId').value;
        const title = document.getElementById('editPostTitle').value.trim();
        const content = document.getElementById('editPostContent').value.trim();
        if(!title || !content) return;

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const { error } = await supabaseClient.from('posts').update({ title, content }).match({ id: id });

        if(!error) {
            bootstrap.Modal.getInstance(document.getElementById('editPostModal')).hide();
            Swal.fire({ icon: 'success', title: 'แก้ไขสำเร็จ', showConfirmButton: false, timer: 1000 });
            loadPosts();
        } else { Swal.fire('Error', error.message, 'error'); }
    }

    async function submitPost() {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const category = document.getElementById('postCategory').value;
        if(!title || !content) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');

        const { error } = await supabaseClient.from('posts').insert([{
            title: title, 
            content: content, 
            category: category,
            author_name: currentInstructor.name, 
            author_seq: currentInstructor.seq, 
            author_avatar: currentInstructor.avatar
        }]);

        if(!error) {
            bootstrap.Modal.getInstance(document.getElementById('addPostModal')).hide();
            loadPosts();
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
        } else {
            Swal.fire('Error', error.message, 'error');
        }
    }

    function logout() { localStorage.removeItem('stb_instructor'); location.reload(); }
</script>
</body>
</html>
