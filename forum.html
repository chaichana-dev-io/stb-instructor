<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บบอร์ด - STOP THE BLEED INSTRUCTOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --stb-red: #b3252b;
            --stb-black: #000000;
            --stb-white: #ffffff;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        
        .navbar { background-color: var(--stb-black) !important; border-bottom: 4px solid var(--stb-red); height: 55px; }
        .navbar-brand { font-size: 15px; color: white !important; font-weight: 600; }

        .forum-container { max-width: 900px; margin: 30px auto; }
        .post-card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; transition: 0.3s; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .author-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
        .btn-stb { background-color: var(--stb-red); color: white; border-radius: 25px; font-weight: 600; border: none; padding: 10px 25px; transition: 0.2s; }
        .btn-stb:hover { background-color: #8a1d21; color: white; }

        .hidden { display: none !important; }
        .user-pill { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; color: white; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand m-0" href="index.html">
            <i class="fas fa-comments me-2" style="color: var(--stb-red);"></i>เว็บบอร์ดผู้สอน
        </a>
        <div id="userInfo" class="hidden d-flex align-items-center">
            <div class="user-pill me-2">
                <img id="userAvatar" src="" style="width: 25px; height: 25px; border-radius: 50%; object-fit: cover;">
                <span id="userNameDisplay" class="fw-bold d-none d-sm-inline"></span>
            </div>
            <a href="index.html" class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill me-2">
                <i class="fas fa-home me-1"></i>หน้าหลัก
            </a>
            <button class="btn btn-danger btn-sm rounded-pill" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<div class="container forum-container hidden" id="forumContent">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold"><i class="fas fa-list-ul me-2 text-danger"></i>กระทู้ถาม-ตอบ</h3>
        <button class="btn-stb" data-bs-toggle="modal" data-bs-target="#addPostModal">
            <i class="fas fa-plus me-2"></i>ตั้งคำถามใหม่
        </button>
    </div>
    
    <div id="postsList">
        <div class="text-center py-5">
            <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;"></div>
            <div class="mt-2 text-muted fw-bold">กำลังโหลดข้อมูล...</div>
        </div>
    </div>
</div>

<!-- Modal: Login -->
<div class="modal fade" id="loginModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.2);">
            <div class="modal-body p-5 text-center">
                <i class="fas fa-lock-open fa-3x text-danger mb-4"></i>
                <h4 class="fw-bold mb-3">เข้าสู่พื้นที่เฉพาะสมาชิก</h4>
                <p class="text-muted small mb-4">กรุณากรอกรหัสผ่านเพื่อยืนยันตัวตนผู้สอน</p>
                <input type="password" id="passInput" class="form-control form-control-lg text-center fw-bold mb-3" placeholder="ระบุรหัสผ่านที่นี่">
                <button class="btn btn-danger w-100 btn-lg fw-bold" onclick="handleLogin()">ยืนยันสิทธิ์</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: New Post -->
<div class="modal fade" id="addPostModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="modal-title fw-bold text-danger"><i class="fas fa-edit me-2"></i>ระบุคำถามของคุณ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">หมวดหมู่</label>
                    <select id="postCategory" class="form-select">
                        <option value="พูดคุยทั่วไป">พูดคุยทั่วไป</option>
                        <option value="เทคนิคการสอน">เทคนิคการสอน</option>
                        <option value="อุปกรณ์การแพทย์">อุปกรณ์การแพทย์</option>
                        <option value="คำถามจากนักเรียน">คำถามจากนักเรียน</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">หัวข้อคำถาม</label>
                    <input type="text" id="postTitle" class="form-control" placeholder="ระบุหัวข้อคำถาม">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">รายละเอียด</label>
                    <textarea id="postContent" class="form-control" rows="5" placeholder="รายละเอียด..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn-stb" onclick="submitPost()">โพสต์กระทู้</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // --- Configuration ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxnr0zqjwDx3nmLii061zOnU_Bhvva8UxQ-Qf1beH0EA8eRAOFigiuxrpn_Qihci8DE/exec';
    const SUPABASE_URL = 'https://cvtpzuqmensoigxzmwrk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dHB6dXFtZW5zb2lneHptd3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzM5NDEsImV4cCI6MjA5NDIwOTk0MX0.yrpFk48HUihXuhZzLZ6_3yEtZhduU8yRZgQ-VrYUwQY';
    
    // ประกาศเพียงครั้งเดียวที่นี่
    let supabase;
    let currentUser = null;
    let loginModalInstance;

    document.addEventListener('DOMContentLoaded', () => {
        // 1. Init Supabase
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 2. Init Login Modal
        const modalElement = document.getElementById('loginModal');
        loginModalInstance = new bootstrap.Modal(modalElement);
        
        // 3. Check Authentication
        checkAuth();
    });

    function checkAuth() {
        const saved = localStorage.getItem('stb_instructor');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                renderUI();
                loadPosts();
            } catch (e) {
                localStorage.removeItem('stb_instructor');
                loginModalInstance.show();
            }
        } else {
            loginModalInstance.show();
        }
    }

    async function handleLogin() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;

        Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        try {
            const res = await fetch(`${GAS_URL}?action=getMembers&t=${Date.now()}`);
            const members = await res.json();
            const found = members.find(m => String(m.sequence || m.ลำดับ) === pass);

            if (found) {
                currentUser = {
                    seq: pass,
                    name: found.fullname || found.fullName || found.ชื่อนามสกุล || 'ไม่ระบุชื่อ',
                    avatar: found.imageurl || found.imageUrl || found.รูปภาพ || ''
                };
                
                if(currentUser.avatar.includes('id=')) {
                    currentUser.avatar = `https://drive.google.com/thumbnail?id=${currentUser.avatar.split('id=')[1].split('&')[0]}&sz=w200`;
                }

                localStorage.setItem('stb_instructor', JSON.stringify(currentUser));
                Swal.close();
                loginModalInstance.hide();
                renderUI();
                loadPosts();
            } else {
                Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error');
            }
        } catch (e) {
            Swal.fire('Error', 'การเชื่อมต่อขัดข้อง', 'error');
        }
    }

    function renderUI() {
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('forumContent').classList.remove('hidden');
        document.getElementById('userAvatar').src = currentUser.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('userNameDisplay').innerText = currentUser.name;
    }

    async function loadPosts() {
        const container = document.getElementById('postsList');
        const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
        
        if (error) {
            container.innerHTML = '<div class="text-center text-danger">ไม่สามารถโหลดข้อมูลได้</div>';
            return;
        }

        if (data.length === 0) {
            container.innerHTML = '<div class="text-center py-5 text-muted">ยังไม่มีกระทู้ในขณะนี้</div>';
            return;
        }

        container.innerHTML = data.map(p => `
            <div class="card post-card p-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img src="${p.author_avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="author-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                    <div class="w-100">
                        <div class="d-flex justify-content-between">
                            <div class="fw-bold text-danger">${p.author_name}</div>
                            <span class="badge bg-danger rounded-pill">${p.category || 'พูดคุยทั่วไป'}</span>
                        </div>
                        <div class="text-muted small">${new Date(p.created_at).toLocaleString('th-TH')}</div>
                    </div>
                </div>
                <h5 class="fw-bold mb-2">${p.title}</h5>
                <p class="text-muted mb-0" style="white-space: pre-wrap;">${p.content}</p>
            </div>
        `).join('');
    }

    async function submitPost() {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const category = document.getElementById('postCategory').value;
        if(!title || !content) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');

        const btn = document.querySelector('.modal-footer .btn-stb');
        btn.disabled = true;

        const { error } = await supabase.from('posts').insert([{
            title, content, category,
            author_name: currentUser.name, 
            author_seq: currentUser.seq, 
            author_avatar: currentUser.avatar
        }]);

        if(!error) {
            bootstrap.Modal.getInstance(document.getElementById('addPostModal')).hide();
            loadPosts();
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
        }
        btn.disabled = false;
    }

    function logout() {
        localStorage.removeItem('stb_instructor');
        location.reload();
    }
</script>
</body>
</html>
