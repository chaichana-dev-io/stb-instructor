<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทำเนียบผู้เชี่ยวชาญ - STOP THE BLEED INSTRUCTOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --stb-red: #b3252b;
            --stb-black: #000000;
            --stb-white: #ffffff;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: #fcfcfc; color: #333; }
        
        /* Navbar ธีมหลัก */
        .navbar { 
            background-color: var(--stb-black) !important; 
            border-bottom: 4px solid var(--stb-red);
            height: 55px; 
        }
        .navbar-brand { font-size: 15px; color: white !important; font-weight: 600; }

        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        #listPage .card { min-height: 600px; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* Profile Styling */
        .profile-img-detail { 
            width: 100%; aspect-ratio: 3/4; 
            object-fit: cover; background-color: #eee; border-radius: 15px; 
            border: 5px solid var(--stb-white); box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
        }
        
        .profile-thumb { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }

        /* Table & Search */
        tr { cursor: pointer; transition: 0.2s; }
        tr:hover { background-color: rgba(179, 37, 43, 0.05) !important; }
        .input-group-text { border-color: #eee; }
        #searchInput:focus { border-color: var(--stb-red); box-shadow: none; }

        /* Detail Labels */
        .info-label { color: #888; font-size: 0.85rem; display: block; margin-bottom: 2px; font-weight: 400; }
        .info-value { font-weight: 700; font-size: 1.1rem; color: #222; word-break: break-word; }
        .text-red { color: var(--stb-red) !important; }

        /* Pagination */
        .pagination-container { padding: 25px 0; display: flex; justify-content: center; gap: 8px; }
        .page-btn {
            border: 1px solid #ddd; background: white; color: #333;
            width: 40px; height: 400px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s;
        }
        .page-btn.active { background: var(--stb-red); color: white; border-color: var(--stb-red); }
        .page-btn:hover:not(.active) { background: #f0f0f0; }

        /* Inputs for Edit Mode */
        .edit-input { 
            font-weight: 600; font-size: 1.05rem; border: 1.5px solid #ddd; 
            border-radius: 10px; padding: 10px 15px; width: 100%; outline: none;
        }
        .edit-input:focus { border-color: var(--stb-red); }

        .detail-header { background: linear-gradient(135deg, #1a1a1a, #000); color: white; }

        /* Loading */
        #loadingOverlay { z-index: 10000; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-tint me-2" style="color: var(--stb-red);"></i>STOP THE BLEED INSTRUCTOR
            </a>
        </div>
    </nav>

    <div class="container py-2 text-center">
        <!-- หน้าแสดงรายชื่อ (List Page) -->
        <div id="listPage">
            <div class="card p-4 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold m-0 text-start" style="color: var(--stb-red);">
                        <i class="fas fa-address-book me-2"></i>ทำเนียบผู้เชี่ยวชาญ
                    </h3>
                    <a href="register.html" class="btn btn-danger rounded-pill px-3 fw-bold btn-sm">
                        <i class="fas fa-plus me-1"></i>ลงทะเบียนเพิ่ม
                    </a>
                </div>

                <div class="input-group mb-4 shadow-sm border rounded-pill overflow-hidden">
                    <span class="input-group-text bg-white border-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control border-0 ps-0" placeholder="ค้นหาชื่อ, ชื่อเล่น หรือลำดับ..." onkeyup="filterData()">
                </div>
                
                <div class="table-responsive text-start">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" width="15%">รูปโปรไฟล์</th>
                                <th>ชื่อ-นามสกุล</th>
                                <th width="20%">ชื่อเล่น</th>
                                <th class="text-center" width="15%">ดูข้อมูล</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div id="pagination" class="pagination-container"></div>
            </div>
        </div>

        <!-- หน้าแสดงรายละเอียด (Detail Page) -->
        <div id="detailPage" class="hidden text-start">
            <button class="btn btn-link text-decoration-none fw-bold mb-3 text-dark" onclick="showPage('list')">
                <i class="fas fa-arrow-left me-1"></i> กลับไปหน้ารายชื่อ
            </button>
            <div class="card overflow-hidden shadow-lg border-0">
                <div class="row g-0">
                    <!-- ส่วนรูปภาพ (ซ้าย) -->
                    <div class="col-md-5 detail-header p-4 d-flex flex-column align-items-center justify-content-center text-center">
                        <div class="profile-container" style="width: 100%; max-width: 280px;">
                            <img id="detailImage" src="" class="profile-img-detail mb-3" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                            <div id="editImageSection" class="hidden mb-3">
                                <label class="text-white-50 small d-block mb-1">เลือกรูปถ่ายใหม่</label>
                                <input type="file" id="fileInput" class="form-control form-control-sm" accept="image/*">
                            </div>
                        </div>
                        <h2 id="detailName" class="fw-extrabold text-white mb-2"></h2>
                        <span id="detailNick" class="badge bg-danger text-white fs-6 px-4 rounded-pill"></span>
                    </div>

                    <!-- ส่วนข้อมูล (ขวา) -->
                    <div class="col-md-7 p-4 p-md-5 bg-white">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h4 class="fw-bold m-0" style="color: var(--stb-red);">Instructor Profile</h4>
                            <div>
                                <button id="btnEdit" class="btn btn-dark btn-sm px-3 rounded-pill fw-bold" onclick="enableEdit()"><i class="fas fa-edit me-1"></i>แก้ไขข้อมูล</button>
                                <button id="btnSave" class="btn btn-success btn-sm px-3 rounded-pill fw-bold hidden" onclick="saveData()"><i class="fas fa-save me-1"></i>บันทึก</button>
                                <button id="btnCancel" class="btn btn-light btn-sm px-3 rounded-pill fw-bold hidden ms-1" onclick="cancelEdit()">ยกเลิก</button>
                            </div>
                        </div>

                        <form id="editForm">
                            <div class="row g-4">
                                <div class="col-6">
                                    <span class="info-label">ลำดับที่</span>
                                    <span id="textSeq" class="info-value text-red"></span>
                                    <input type="hidden" id="inputSeq">
                                </div>
                                <div class="col-6">
                                    <span class="info-label">เบอร์โทรศัพท์</span>
                                    <span id="textPhone" class="info-value info-text"></span>
                                    <input type="text" id="inputPhone" class="edit-input hidden">
                                </div>
                                <div class="col-12">
                                    <span class="info-label">ชื่อ - นามสกุล</span>
                                    <span id="textName" class="info-value info-text"></span>
                                    <input type="text" id="inputName" class="edit-input hidden">
                                </div>
                                <div class="col-12">
                                    <span class="info-label">สังกัด / หน่วยงาน / ที่อยู่</span>
                                    <div id="textAddress" class="p-3 bg-light rounded info-text fw-bold"></div>
                                    <textarea id="inputAddress" class="edit-input hidden" rows="2"></textarea>
                                </div>
                                
                                <!-- ช่อง Social Media -->
                                <div class="col-md-6">
                                    <span class="info-label"><i class="fab fa-line text-success me-1"></i>Line ID</span>
                                    <span id="textLine" class="info-value info-text"></span>
                                    <input type="text" id="inputLine" class="edit-input hidden">
                                </div>
                                <div class="col-md-6">
                                    <span class="info-label"><i class="far fa-envelope text-secondary me-1"></i>Email</span>
                                    <span id="textEmail" class="info-value info-text"></span>
                                    <input type="text" id="inputEmail" class="edit-input hidden">
                                </div>
                                <div class="col-md-6">
                                    <span class="info-label"><i class="fab fa-facebook text-primary me-1"></i>Facebook</span>
                                    <span id="textFb" class="info-value info-text"></span>
                                    <input type="text" id="inputFb" class="edit-input hidden">
                                </div>
                                <div class="col-md-6">
                                    <span class="info-label"><i class="fab fa-instagram text-danger me-1"></i>Instagram</span>
                                    <span id="textIg" class="info-value info-text"></span>
                                    <input type="text" id="inputIg" class="edit-input hidden">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="position-fixed top-0 start-0 w-100 h-100 bg-white opacity-75 d-flex flex-column justify-content-center align-items-center hidden">
        <div class="spinner-border text-danger mb-2" style="width: 3rem; height: 3rem;"></div>
        <h6 class="fw-bold text-danger">กำลังดำเนินการ...</h6>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxnr0zqjwDx3nmLii061zOnU_Bhvva8UxQ-Qf1beH0EA8eRAOFigiuxrpn_Qihci8DE/exec';
        let members = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentMember = null;

        function getDirectImg(url) {
            if(!url || url === "") return 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            if(url.includes('id=')) {
                let id = url.split('id=')[1].split('&')[0];
                return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
            }
            return url;
        }

        async function fetchData() {
            showLoad(true);
            try {
                const res = await fetch(`${scriptUrl}?action=getMembers&t=${Date.now()}`);
                const data = await res.json();
                members = data.sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));
                renderTable();
            } catch (e) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error'); }
            showLoad(false);
        }

        function renderTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = members.filter(m => 
                (m.sequence || '').toString().includes(val) || 
                (m.fullName || '').toLowerCase().includes(val) || 
                (m.nickname || '').toLowerCase().includes(val)
            );
            
            const startIndex = (currentPage - 1) * rowsPerPage;
            const paginatedData = filtered.slice(startIndex, startIndex + rowsPerPage);
            const body = document.getElementById('tableBody');
            
            body.innerHTML = paginatedData.map(m => `
                <tr onclick="viewDetail('${m.sequence}')">
                    <td class="text-center">
                        <img src="${getDirectImg(m.imageUrl || m.imageurl)}" class="profile-thumb" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                    </td>
                    <td class="fw-bold">${m.fullName || ''}</td>
                    <td>${m.nickname || '-'}</td>
                    <td class="text-center text-danger"><i class="fas fa-chevron-right"></i></td>
                </tr>
            `).join('');
            renderPagination(filtered.length);
        }

        function renderPagination(totalRows) {
            const totalPages = Math.ceil(totalRows / rowsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            if (totalPages <= 1) return;
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i; btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderTable(); window.scrollTo(0,0); };
                container.appendChild(btn);
            }
        }

        function filterData() { currentPage = 1; renderTable(); }

        function viewDetail(seq) {
            currentMember = members.find(m => m.sequence.toString() === seq.toString());
            if (!currentMember) return;
            
            document.getElementById('detailImage').src = getDirectImg(currentMember.imageUrl || currentMember.imageurl);
            document.getElementById('detailName').innerText = currentMember.fullName || '';
            document.getElementById('detailNick').innerText = currentMember.nickname || '-';
            
            document.getElementById('textSeq').innerText = currentMember.sequence || '';
            document.getElementById('textName').innerText = currentMember.fullName || '';
            document.getElementById('textNick').innerText = currentMember.nickname || '-';
            document.getElementById('textPhone').innerText = currentMember.phone || '-';
            document.getElementById('textEmail').innerText = currentMember.email || '-';
            document.getElementById('textLine').innerText = currentMember.lineId || '-';
            document.getElementById('textFb').innerText = currentMember.facebook || '-';
            document.getElementById('textIg').innerText = currentMember.instagram || '-';
            document.getElementById('textAddress').innerText = currentMember.address || '-';
            
            cancelEdit(); showPage('detail');
        }

        function showPage(p) {
            document.getElementById('listPage').classList.toggle('hidden', p !== 'list');
            document.getElementById('detailPage').classList.toggle('hidden', p !== 'detail');
        }

        function enableEdit() {
            document.querySelectorAll('.info-text').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.edit-input').forEach(el => el.classList.remove('hidden'));
            document.getElementById('inputSeq').value = currentMember.sequence;
            document.getElementById('inputName').value = currentMember.fullName || '';
            document.getElementById('inputNick').value = currentMember.nickname || '';
            document.getElementById('inputPhone').value = currentMember.phone || '';
            document.getElementById('inputEmail').value = currentMember.email || '';
            document.getElementById('inputLine').value = currentMember.lineId || '';
            document.getElementById('inputFb').value = currentMember.facebook || '';
            document.getElementById('inputIg').value = currentMember.instagram || '';
            document.getElementById('inputAddress').value = currentMember.address || '';
            
            document.getElementById('editImageSection').classList.remove('hidden');
            document.getElementById('btnEdit').classList.add('hidden');
            document.getElementById('btnSave').classList.remove('hidden');
            document.getElementById('btnCancel').classList.remove('hidden');
        }

        function cancelEdit() {
            document.querySelectorAll('.info-text').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.edit-input').forEach(el => el.classList.add('hidden'));
            document.getElementById('editImageSection').classList.add('hidden');
            document.getElementById('btnEdit').classList.remove('hidden');
            document.getElementById('btnSave').classList.add('hidden');
            document.getElementById('btnCancel').classList.add('hidden');
        }

        async function saveData() {
            const confirm = await Swal.fire({
                title: 'ยืนยันการบันทึก?',
                text: "ข้อมูลเดิมจะถูกเขียนทับ",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#b3252b',
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก'
            });
            if (!confirm.isConfirmed) return;

            showLoad(true);
            const file = document.getElementById('fileInput').files[0];
            const payload = {
                action: 'edit',
                sequence: document.getElementById('inputSeq').value,
                fullName: document.getElementById('inputName').value,
                nickname: document.getElementById('inputNick').value,
                phone: document.getElementById('inputPhone').value,
                email: document.getElementById('inputEmail').value,
                lineId: document.getElementById('inputLine').value,
                facebook: document.getElementById('inputFb').value,
                instagram: document.getElementById('inputIg').value,
                address: document.getElementById('inputAddress').value
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    payload.image = e.target.result;
                    payload.imageName = `Edit_Member_${payload.sequence}`;
                    await sendToServer(payload);
                };
                reader.readAsDataURL(file);
            } else { await sendToServer(payload); }
        }

        async function sendToServer(p) {
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
                Swal.fire({
                    title: 'สำเร็จ',
                    text: 'อัปเดตข้อมูลวิทยากรเรียบร้อยแล้ว',
                    icon: 'success',
                    confirmButtonColor: '#b3252b'
                }).then(() => location.reload());
            } catch (e) { location.reload(); }
        }

        function showLoad(s) { document.getElementById('loadingOverlay').classList.toggle('hidden', !s); }
        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
